<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deeh – Your Private Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #60a5fa;
            --accent-hover: #93c5fd;
            --border: #334155;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }

        #app {
            max-width: 700px;
            margin: 0 auto;
            background: var(--bg-secondary);
            min-height: 100vh;
            box-shadow: var(--shadow);
            position: relative;
        }

        .navbar {
            background: var(--bg-secondary);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 1.2rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
        }

        main {
            padding: 1rem;
            padding-bottom: calc(80px + 1rem);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            max-width: 700px;
            width: 100%;
            background: var(--bg-secondary);
            display: flex;
            justify-content: space-around;
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        .bottom-nav a {
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .bottom-nav a.active {
            color: var(--accent);
        }

        .create-post {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .create-post textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            resize: none;
            font-size: 1rem;
            margin-bottom: 0.75rem;
        }

        .create-post button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            float: right;
        }

        .file-input-label {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: var(--border);
            color: var(--text-primary);
            border-radius: 2rem;
            cursor: pointer;
            margin-right: 0.5rem;
        }

        .file-input-label i {
            margin-right: 0.3rem;
        }

        #fileInput {
            display: none;
        }

        .media-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 10px 0;
        }

        .media-preview-item {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .media-preview-item img,
        .media-preview-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .remove-media {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 14px;
        }

        .post {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .post-user-info {
            flex: 1;
        }

        .post-username {
            font-weight: 600;
        }

        .post-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .post-content {
            margin-bottom: 0.75rem;
            white-space: pre-wrap;
        }

        .post-media {
            max-width: 100%;
            border-radius: 12px;
            margin: 10px 0;
        }

        .post-stats {
            display: flex;
            gap: 1.5rem;
            padding: 0.5rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .post-actions {
            display: flex;
            justify-content: space-around;
            padding: 0.5rem 0;
        }

        .post-action {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }

        .post-action:hover {
            background: var(--border);
        }

        .post-action.liked {
            color: #ef4444;
        }

        .comments-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .comment {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
        }

        .comment-content {
            flex: 1;
            background: var(--bg-primary);
            padding: 0.6rem 1rem;
            border-radius: 1rem;
        }

        .comment-user {
            font-weight: 600;
            cursor: pointer;
            color: var(--accent);
        }

        .add-comment {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .add-comment input {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            border-radius: 2rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .add-comment button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1.5rem;
        }

        .search-bar i {
            color: var(--text-secondary);
            margin-right: 0.5rem;
        }

        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            color: var(--text-primary);
        }

        .search-results {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.5rem;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-result-item:hover {
            background: var(--border);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 600;
            margin: 0 auto 1rem;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .follow-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .follow-btn.following {
            background: var(--border);
            color: var(--text-primary);
        }

        .settings-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }

        .settings-tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        .settings-tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        .settings-section {
            background: var(--bg-primary);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .settings-label {
            font-weight: 500;
        }

        .settings-input {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            color: var(--text-primary);
            width: 200px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border);
            transition: 0.3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .danger-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="logo" onclick="changeView('feed')">Deeh</div>
            <div class="nav-links" id="navLinks"></div>
        </nav>
        <main id="mainContent"></main>
        <div class="bottom-nav" id="bottomNav"></div>
    </div>

    <script>
        // ========== CONFIG ==========
        const API_BASE = 'http://localhost:5000/api';  // CHANGE THIS TO YOUR BACKEND URL

        // ========== STATE ==========
        let currentUser = null;
        let currentView = 'feed';
        let viewingUserId = null;
        let darkMode = false;
        let settingsTab = 'account';
        let users = [];          // array of user objects from backend
        let posts = [];          // array of post objects from backend

        // For create post media
        let selectedFiles = [];   // array of File objects

        // ========== INIT ==========
        async function init() {
            // Load dark mode preference
            const savedDarkMode = localStorage.getItem('deeh_dark_mode');
            if (savedDarkMode === 'true') {
                darkMode = true;
                document.body.classList.add('dark-mode');
            }
            // Load accent color
            const savedAccent = localStorage.getItem('deeh_accent_color');
            if (savedAccent) {
                document.documentElement.style.setProperty('--accent', savedAccent);
            }

            // Check token
            const token = localStorage.getItem('deeh_token');
            if (token) {
                try {
                    const res = await fetch(`${API_BASE}/auth/me`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        currentUser = data.user;
                        await loadAllData();
                        changeView('feed');
                    } else {
                        localStorage.removeItem('deeh_token');
                        showLogin();
                    }
                } catch (err) {
                    console.warn('Backend not reachable, using demo mode');
                    // Fallback to demo data
                    loadDemoData();
                    const savedUser = localStorage.getItem('deeh_current_user');
                    if (savedUser) {
                        currentUser = JSON.parse(savedUser);
                        changeView('feed');
                    } else {
                        showLogin();
                    }
                }
            } else {
                showLogin();
            }
        }

        function loadDemoData() {
            users = {
                'alice': { username: 'alice', name: 'Alice', avatar: 'A', email: 'alice@example.com', bio: 'Digital artist ✨', followers: ['bob'], following: ['bob', 'charlie'] },
                'bob': { username: 'bob', name: 'Bob', avatar: 'B', email: 'bob@example.com', bio: 'Privacy advocate 🔒', followers: ['alice', 'charlie'], following: ['alice'] },
                'charlie': { username: 'charlie', name: 'Charlie', avatar: 'C', email: 'charlie@example.com', bio: 'Developer 🚀', followers: ['bob'], following: ['alice'] }
            };
            posts = [
                { id: 1, userId: 'alice', content: 'Hello Deeh!', media: [], time: new Date().toISOString(), likes: 5, likedBy: ['bob'], comments: [], shares: 0 },
                { id: 2, userId: 'bob', content: 'Privacy first!', media: [], time: new Date().toISOString(), likes: 12, likedBy: ['alice','charlie'], comments: [], shares: 0 },
                { id: 3, userId: 'charlie', content: 'Building features!', media: [], time: new Date().toISOString(), likes: 8, likedBy: ['bob'], comments: [], shares: 0 }
            ];
        }

        async function loadAllData() {
            try {
                const [usersRes, postsRes] = await Promise.all([
                    fetch(`${API_BASE}/users`),
                    fetch(`${API_BASE}/posts`)
                ]);
                if (usersRes.ok) users = await usersRes.json();
                if (postsRes.ok) posts = await postsRes.json();
            } catch (e) {
                console.warn('Using demo data');
                loadDemoData();
            }
        }

        // ========== HELPER FUNCTIONS ==========
        function formatTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return diffMins + 'm ago';
            if (diffHours < 24) return diffHours + 'h ago';
            return diffDays + 'd ago';
        }

        function getUserByUsername(username) {
            if (Array.isArray(users)) {
                return users.find(u => u.username === username);
            } else {
                return users[username]; // for object format
            }
        }

        function renderNav() {
            const navLinks = document.getElementById('navLinks');
            const bottomNav = document.getElementById('bottomNav');

            if (currentUser) {
                navLinks.innerHTML = `
                    <a class="${currentView === 'feed' ? 'active' : ''}" onclick="changeView('feed')"><i class="fas fa-home"></i> Home</a>
                    <a class="${currentView === 'search' ? 'active' : ''}" onclick="changeView('search')"><i class="fas fa-search"></i> Search</a>
                    <a class="${currentView === 'profile' ? 'active' : ''}" onclick="changeView('profile')"><i class="fas fa-user"></i> Profile</a>
                    <a class="${currentView === 'settings' ? 'active' : ''}" onclick="changeView('settings')"><i class="fas fa-cog"></i> Settings</a>
                `;
                bottomNav.innerHTML = `
                    <a class="${currentView === 'feed' ? 'active' : ''}" onclick="changeView('feed')"><i class="fas fa-home"></i></a>
                    <a class="${currentView === 'search' ? 'active' : ''}" onclick="changeView('search')"><i class="fas fa-search"></i></a>
                    <a onclick="showCreatePost()"><i class="fas fa-plus-circle"></i></a>
                    <a class="${currentView === 'profile' ? 'active' : ''}" onclick="changeView('profile')"><i class="fas fa-user"></i></a>
                    <a class="${currentView === 'settings' ? 'active' : ''}" onclick="changeView('settings')"><i class="fas fa-cog"></i></a>
                `;
            } else {
                navLinks.innerHTML = `
                    <a onclick="showLogin()"><i class="fas fa-sign-in-alt"></i> Login</a>
                    <a onclick="showRegister()"><i class="fas fa-user-plus"></i> Register</a>
                `;
                bottomNav.innerHTML = `
                    <a onclick="showLogin()"><i class="fas fa-home"></i></a>
                    <a onclick="showLogin()"><i class="fas fa-search"></i></a>
                    <a onclick="showLogin()"><i class="fas fa-user"></i></a>
                    <a onclick="showLogin()"><i class="fas fa-cog"></i></a>
                `;
            }
        }

        function changeView(view) {
            if (!currentUser && view !== 'login' && view !== 'register') {
                showLogin();
                return;
            }
            currentView = view;
            if (view === 'feed') showFeed();
            else if (view === 'search') showSearch();
            else if (view === 'profile') showProfile(currentUser.username);
            else if (view === 'settings') showSettings();
            else if (view === 'userProfile' && viewingUserId) showProfile(viewingUserId);
        }

        // ========== AUTH ==========
        function showLogin() {
            currentView = 'login';
            renderNav();
            document.getElementById('mainContent').innerHTML = `
                <div style="max-width: 400px; margin: 2rem auto;">
                    <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
                    <form id="loginForm">
                        <div style="margin-bottom: 1rem;">
                            <label>Username</label>
                            <input type="text" id="loginUsername" placeholder="Enter username" style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:0.5rem; background:var(--bg-primary); color:var(--text-primary);">
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <label>Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter password" style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:0.5rem; background:var(--bg-primary); color:var(--text-primary);">
                        </div>
                        <button type="submit" style="width:100%; padding:0.8rem; background:var(--accent); color:white; border:none; border-radius:0.5rem; font-size:1rem;">Log In</button>
                        <p style="text-align:center; margin-top:1rem;">
                            Don't have an account? <a href="#" onclick="showRegister()" style="color:var(--accent);">Sign up</a>
                        </p>
                    </form>
                </div>
            `;
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                try {
                    const res = await fetch(`${API_BASE}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        localStorage.setItem('deeh_token', data.token);
                        currentUser = data.user;
                        await loadAllData();
                        changeView('feed');
                    } else {
                        alert(data.msg || 'Login failed');
                    }
                } catch (err) {
                    // Fallback to demo login
                    if (users[username]) {
                        currentUser = { username, name: users[username].name, email: users[username].email };
                        localStorage.setItem('deeh_current_user', JSON.stringify(currentUser));
                        changeView('feed');
                    } else {
                        alert('Invalid credentials');
                    }
                }
            });
        }

        function showRegister() {
            currentView = 'register';
            renderNav();
            document.getElementById('mainContent').innerHTML = `
                <div style="max-width: 400px; margin: 2rem auto;">
                    <h2 style="text-align: center; margin-bottom: 2rem;">Join Deeh</h2>
                    <form id="registerForm">
                        <div style="margin-bottom: 1rem;">
                            <label>Name</label>
                            <input type="text" id="regName" required style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:0.5rem; background:var(--bg-primary); color:var(--text-primary);">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label>Username</label>
                            <input type="text" id="regUsername" required style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:0.5rem; background:var(--bg-primary); color:var(--text-primary);">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label>Email</label>
                            <input type="email" id="regEmail" required style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:0.5rem; background:var(--bg-primary); color:var(--text-primary);">
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <label>Password</label>
                            <input type="password" id="regPassword" required style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:0.5rem; background:var(--bg-primary); color:var(--text-primary);">
                        </div>
                        <button type="submit" style="width:100%; padding:0.8rem; background:var(--accent); color:white; border:none; border-radius:0.5rem; font-size:1rem;">Sign Up</button>
                        <p style="text-align:center; margin-top:1rem;">
                            Already have an account? <a href="#" onclick="showLogin()" style="color:var(--accent);">Log in</a>
                        </p>
                    </form>
                </div>
            `;
            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('regName').value.trim();
                const username = document.getElementById('regUsername').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value;

                try {
                    const res = await fetch(`${API_BASE}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, name, email, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        localStorage.setItem('deeh_token', data.token);
                        currentUser = data.user;
                        await loadAllData();
                        changeView('feed');
                    } else {
                        alert(data.msg || 'Registration failed');
                    }
                } catch (err) {
                    // Fallback demo register
                    if (users[username]) {
                        alert('Username already taken');
                        return;
                    }
                    const newUser = {
                        username, name, email, avatar: name.charAt(0).toUpperCase(), bio: '', followers: [], following: []
                    };
                    users[username] = newUser;
                    currentUser = { username, name, email };
                    localStorage.setItem('deeh_current_user', JSON.stringify(currentUser));
                    changeView('feed');
                }

        function updateMediaPreview() {
            const preview = document.getElementById('mediaPreview');
            if (!preview) return;
            preview.innerHTML = selectedFiles.map((file, index) => {
                const url = URL.createObjectURL(file);
                const isImage = file.type.startsWith('image/');
                return `
                    <div class="media-preview-item">
                        ${isImage ? `<img src="${url}">` : `<video src="${url}"></video>`}
                        <button class="remove-media" onclick="removeMedia(${index})">×</button>
                    </div>
                `;

            selectedFiles.splice(index, 1);
            updateMediaPreview();

        async function createPost() {
            const content = document.getElementById('newPostContent')?.value.trim() || '';
            if (!content && selectedFiles.length === 0) return;

            const formData = new FormData();
            formData.append('userId', currentUser.username);
            formData.append('content', content);
            selectedFiles.forEach(file => formData.append('media', file));

            try {
                const token = localStorage.getItem('deeh_token');
                const res = await fetch(`${API_BASE}/posts`, {
                    method: 'POST',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                    body: formData
                });
                if (res.ok) {
                    const newPost = await res.json();
                    posts.unshift(newPost);
                    selectedFiles = [];
                    showFeed();
                } else {
                    alert('Failed to create post');
                }
            } catch (err) {
                // Fallback: create post locally with base64 (not for production)
                const newPost = {
                    id: Date.now(),
                    userId: currentUser.username,
                    content,
                    media: await Promise.all(selectedFiles.map(async file => ({
                        type: file.type.startsWith('image/') ? 'image' : 'video',
                        dataUrl: await fileToDataURL(file)
                    }))),
                    time: new Date().toISOString(),
                    likes: 0,
                    likedBy: [],
                    comments: [],
                    shares: 0
                };
                posts.unshift(newPost);
                selectedFiles = [];
                showFeed();
            }
        }

        function fileToDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        async function toggleLike(postId) {
            const post = posts.find(p => (p._id || p.id) == postId);
            if (!post) return;
            const liked = post.likedBy.includes(currentUser.username);
            try {
                const token = localStorage.getItem('deeh_token');
                const res = await fetch(`${API_BASE}/posts/${postId}/like`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        ...(token ? { 'Authorization': `Bearer ${token}` } : {})
                    },
                    body: JSON.stringify({ username: currentUser.username })
                });
                if (res.ok) {
                    const updated = await res.json();
                    // update local post
                    Object.assign(post, updated);
                } else {
                    // fallback local toggle
                    if (liked) {
                        post.likedBy = post.likedBy.filter(u => u !== currentUser.username);
                        post.likes--;
                    } else {
                        post.likedBy.push(currentUser.username);
                        post.likes++;
                    }
                }
            } catch (err) {
                // fallback local toggle
                if (liked) {
                    post.likedBy = post.likedBy.filter(u => u !== currentUser.username);
                    post.likes--;
                } else {
                    post.likedBy.push(currentUser.username);
                    post.likes++;
                }
            }
            renderPosts();
        }

        function toggleComments(postId) {
            const section = document.getElementById(`comments-${postId}`);
            if (section) section.classList.toggle('hidden');
        }

        async function addComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            if (!text) return;
            const post = posts.find(p => (p._id || p.id) == postId);
            if (!post) return;
            try {
                const token = localStorage.getItem('deeh_token');
                const res = await fetch(`${API_BASE}/posts/${postId}/comment`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        ...(token ? { 'Authorization': `Bearer ${token}` } : {})
                    },
                    body: JSON.stringify({ userId: currentUser.username, text })
                });
                if (res.ok) {
                    const updated = await res.json();
                    Object.assign(post, updated);
                } else {
                    // fallback
                    post.comments.push({ userId: currentUser.username, text, createdAt: new Date() });
                }
            } catch (err) {
                post.comments.push({ userId: currentUser.username, text, createdAt: new Date() });
            }
            input.value = '';
            renderPosts();
            document.getElementById(`comments-${postId}`).classList.remove('hidden');
        }

        async function sharePost(postId) {
            const post = posts.find(p => (p._id || p.id) == postId);
            if (!post) return;
            try {
                const token = localStorage.getItem('deeh_token');
                const res = await fetch(`${API_BASE}/posts/${postId}/share`, {
                    method: 'POST',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                if (res.ok) {
                    const updated = await res.json();
                    Object.assign(post, updated);
                } else {
                    post.shares = (post.shares || 0) + 1;

                post.shares = (post.shares || 0) + 1;

        async function showProfile(username) {
            let user;
            if (Array.isArray(users)) {
                user = users.find(u => u.username === username);
            } else {
                user = users[username];
            }
            if (!user) {
                // fetch from backend if not in local
                try {

                    if (res.ok) user = await res.json();
                } catch (e) {}
            }
            if (!user) return;

            renderNav();
            const userPosts = posts.filter(p => p.userId === username);
            const totalLikes = userPosts.reduce((sum, p) => sum + p.likes, 0);
            const isOwnProfile = (currentUser.username === username);
            const isFollowing = isOwnProfile ? false : user.followers?.includes(currentUser.username);

            let html = `
                <div class="profile-header">
                    <div class="profile-avatar-large">${user.avatar || user.name.charAt(0)}</div>

                <div id="userPostsContainer"></div>
            `;

            const container = document.getElementById('userPostsContainer');

        async function toggleFollow(username) {
            try {
                const token = localStorage.getItem('deeh_token');
                const res = await fetch(`${API_BASE}/users/${username}/follow`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        ...(token ? { 'Authorization': `Bearer ${token}` } : {})
                    },
                    body: JSON.stringify({ currentUsername: currentUser.username })
                });
                if (res.ok) {
                    // Refresh user data
                    await loadAllData();
                }
            } catch (err) {
                // fallback local
                const target = users[username];
                const current = users[currentUser.username];
                if (!target || !current) return;
                const index = target.followers.indexOf(currentUser.username);
                if (index === -1) {
                    target.followers.push(currentUser.username);
                    current.following.push(username);
                } else {
                    target.followers.splice(index, 1);
                    const idx = current.following.indexOf(username);
                    if (idx !== -1) current.following.splice(idx, 1);
                }
            }
            showProfile(username);
        }

        async function saveAccountSettings() {
            const user = getUserByUsername(currentUser.username);
            const newName = document.getElementById('settingsName')?.value.trim();
            const newEmail = document.getElementById('settingsEmail')?.value.trim();
            const newBio = document.getElementById('settingsBio')?.value.trim();
            if (!newName || !newEmail) return;

            try {
                const token = localStorage.getItem('deeh_token');
                const res = await fetch(`${API_BASE}/users/${currentUser.username}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        ...(token ? { 'Authorization': `Bearer ${token}` } : {})
                    },
                    body: JSON.stringify({ name: newName, email: newEmail, bio: newBio })
                });
                if (res.ok) {
                    const updated = await res.json();
                    if (Array.isArray(users)) {
                        const idx = users.findIndex(u => u.username === currentUser.username);
                        if (idx !== -1) users[idx] = updated;
                    } else {
                        users[currentUser.username] = updated;
                    }
                    currentUser.name = newName;
                    currentUser.email = newEmail;
                    alert('Profile updated!');
                } else {
                    alert('Update failed');
                }
            } catch (err) {
                // fallback local
                user.name = newName;
                user.email = newEmail;
                user.bio = newBio;
                alert('Profile updated (local)');
            }
            renderSettings();
        }

            posts = posts.filter(p => p.userId !== currentUser.username);
            localStorage.removeItem('deeh_token');
            localStorage.removeItem('deeh_current_user');
            currentUser = null;
            showLogin();
        }

        function savePrivacySettings() {
            const user = getUserByUsername(currentUser.username);
            const privateAccount = document.getElementById('privateAccount')?.checked;
            const postPrivacy = document.getElementById('postPrivacy')?.value;
            const messagePrivacy = document.getElementById('messagePrivacy')?.value;
            if (!user.privacy) user.privacy = {};
            user.privacy.public = postPrivacy === 'public';
            user.privacy.messages = messagePrivacy;
            // In real app, send to backend
            alert('Privacy settings saved (locally)');
        }

        function saveNotificationSettings() {
            const email = document.getElementById('emailNotifications')?.checked;
            const push = document.getElementById('pushNotifications')?.checked;
            localStorage.setItem('deeh_email_notif', email);
            localStorage.setItem('deeh_push_notif', push);
            alert('Notification preferences saved');
        }

        function toggleDarkMode() {
            darkMode = !darkMode;
            if (darkMode) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
            localStorage.setItem('deeh_dark_mode', darkMode);
        }

        function changeAccentColor(color) {
            document.documentElement.style.setProperty('--accent', color);
            localStorage.setItem('deeh_accent_color', color);
        }

        function showCreatePost() {
            changeView('feed');
            setTimeout(() => document.getElementById('newPostContent')?.focus(), 100);
        }

        // Start the app
        init();
    </script>
</body>
</html>
