<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deeh – Your Private Social</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== RESET & VARIABLES ========== */
        :root {
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --nav-height: 60px;
        }

        .dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #60a5fa;
            --accent-hover: #93c5fd;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }

        #app {
            max-width: 700px;
            margin: 0 auto;
            background: var(--bg-secondary);
            min-height: 100vh;
            box-shadow: var(--shadow);
            position: relative;
        }

        /* ========== NAVBAR ========== */
        .navbar {
            background: var(--bg-secondary);
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 1.2rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
        }

        /* ========== MAIN CONTENT ========== */
        main {
            padding: 1rem;
            padding-bottom: calc(80px + 1rem);
        }

        /* ========== BOTTOM NAV ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            max-width: 700px;
            width: 100%;
            background: var(--bg-secondary);
            display: flex;
            justify-content: space-around;
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        .bottom-nav a {
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .bottom-nav a.active {
            color: var(--accent);
        }

        /* ========== POST CARD ========== */
        .post {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            transition: transform 0.2s;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .post-user-info {
            flex: 1;
        }

        .post-username {
            font-weight: 600;
            color: var(--text-primary);
        }

        .post-time {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .post-content {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 0.75rem;
            white-space: pre-wrap;
        }

        .post-stats {
            display: flex;
            gap: 1.5rem;
            padding: 0.5rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .post-actions {
            display: flex;
            justify-content: space-around;
            padding: 0.5rem 0;
        }

        .post-action {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }

        .post-action:hover {
            background: var(--border);
        }

        .post-action.liked {
            color: #ef4444;
        }

        /* ========== COMMENTS ========== */
        .comments-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .comment {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
        }

        .comment-content {
            flex: 1;
            background: var(--bg-primary);
            padding: 0.6rem 1rem;
            border-radius: 1rem;
        }

        .comment-user {
            font-weight: 600;
            cursor: pointer;
            color: var(--accent);
        }

        .comment-text {
            color: var(--text-primary);
        }

        .add-comment {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .add-comment input {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            border-radius: 2rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .add-comment button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
        }

        /* ========== CREATE POST ========== */
        .create-post {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .create-post textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            resize: none;
            font-size: 1rem;
            margin-bottom: 0.75rem;
        }

        .create-post button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            float: right;
        }

        /* ========== SEARCH BAR ========== */
        .search-bar {
            display: flex;
            align-items: center;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1.5rem;
        }

        .search-bar i {
            color: var(--text-secondary);
            margin-right: 0.5rem;
        }

        .search-bar input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            color: var(--text-primary);
        }

        .search-results {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.5rem;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-result-item:hover {
            background: var(--border);
        }

        /* ========== PROFILE ========== */
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 600;
            margin: 0 auto 1rem;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.5rem 0;
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .follow-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .follow-btn.following {
            background: var(--border);
            color: var(--text-primary);
        }

        /* ========== SETTINGS ========== */
        .settings-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }

        .settings-tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        .settings-tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        .settings-section {
            background: var(--bg-primary);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .settings-label {
            font-weight: 500;
        }

        .settings-input {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            color: var(--text-primary);
            width: 200px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border);
            transition: 0.3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .danger-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="logo" onclick="changeView('feed')">Deeh</div>
            <div class="nav-links" id="navLinks"></div>
        </nav>

        <!-- Main Content -->
        <main id="mainContent"></main>

        <!-- Bottom Navigation -->
        <div class="bottom-nav" id="bottomNav"></div>
    </div>

    <script>
        // ========== GLOBAL STATE ==========
        let currentUser = null;
        let currentView = 'feed';          // feed, search, profile, settings, userProfile
        let viewingUserId = null;           // for viewing other profiles
        let darkMode = false;
        let settingsTab = 'account';        // current settings tab

        // ========== DATA (localStorage se load/save) ==========
        let users = {};      // key: username, value: user object
        let posts = [];

        // Initialize default data if localStorage empty
        function initData() {
            if (!localStorage.getItem('deeh_users')) {
                // Default users
                users = {
                    'alice': { username: 'alice', name: 'Alice', avatar: 'A', email: 'alice@example.com', bio: 'Digital artist ✨', followers: ['bob'], following: ['bob', 'charlie'], privacy: { public: true, messages: 'everyone' } },
                    'bob': { username: 'bob', name: 'Bob', avatar: 'B', email: 'bob@example.com', bio: 'Privacy advocate 🔒', followers: ['alice', 'charlie'], following: ['alice'], privacy: { public: true, messages: 'everyone' } },
                    'charlie': { username: 'charlie', name: 'Charlie', avatar: 'C', email: 'charlie@example.com', bio: 'Developer 🚀', followers: ['bob'], following: ['alice'], privacy: { public: false, messages: 'followers' } }
                };

                // Default posts
                posts = [
                    { id: 1, userId: 'alice', content: 'Hello Deeh! This is my first post. Excited to be here! 🎉', time: '2025-03-19T10:00:00Z', likes: 5, likedBy: ['bob'], comments: [{ id: 101, userId: 'bob', text: 'Welcome Alice! 👋' }], shares: 1 },
                    { id: 2, userId: 'bob', content: 'Privacy first social network is finally here! No tracking, no data selling. Just pure connection. 🔒', time: '2025-03-19T09:45:00Z', likes: 12, likedBy: ['alice', 'charlie'], comments: [{ id: 102, userId: 'alice', text: 'Love this concept!' }, { id: 103, userId: 'charlie', text: 'Finally a platform I can trust.' }], shares: 3 },
                    { id: 3, userId: 'charlie', content: 'Working on some exciting features for Deeh. Stay tuned! 🚀', time: '2025-03-19T08:30:00Z', likes: 8, likedBy: ['bob'], comments: [{ id: 104, userId: 'bob', text: 'Can\'t wait to see!' }], shares: 0 }
                ];

                saveData();
            } else {
                loadData();
            }
        }

        function saveData() {
            localStorage.setItem('deeh_users', JSON.stringify(users));
            localStorage.setItem('deeh_posts', JSON.stringify(posts));
            if (currentUser) {
                localStorage.setItem('deeh_current_user', JSON.stringify(currentUser));
            }
        }

        function loadData() {
            users = JSON.parse(localStorage.getItem('deeh_users')) || {};
            posts = JSON.parse(localStorage.getItem('deeh_posts')) || [];
            const savedUser = localStorage.getItem('deeh_current_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
            }
            const savedDarkMode = localStorage.getItem('deeh_dark_mode');
            if (savedDarkMode === 'true') {
                darkMode = true;
                document.body.classList.add('dark-mode');
            }
        }

        // ========== HELPER FUNCTIONS ==========
        function formatTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return diffMins + 'm ago';
            if (diffHours < 24) return diffHours + 'h ago';
            return diffDays + 'd ago';
        }

        function getCurrentUserObject() {
            return currentUser ? users[currentUser.username] : null;
        }

        function renderNav() {
            const navLinks = document.getElementById('navLinks');
            const bottomNav = document.getElementById('bottomNav');

            if (currentUser) {
                navLinks.innerHTML = `
                    <a class="${currentView === 'feed' ? 'active' : ''}" onclick="changeView('feed')"><i class="fas fa-home"></i> Home</a>
                    <a class="${currentView === 'search' ? 'active' : ''}" onclick="changeView('search')"><i class="fas fa-search"></i> Search</a>
                    <a class="${currentView === 'profile' ? 'active' : ''}" onclick="changeView('profile')"><i class="fas fa-user"></i> Profile</a>
                    <a class="${currentView === 'settings' ? 'active' : ''}" onclick="changeView('settings')"><i class="fas fa-cog"></i> Settings</a>
                `;
                bottomNav.innerHTML = `
                    <a class="${currentView === 'feed' ? 'active' : ''}" onclick="changeView('feed')"><i class="fas fa-home"></i></a>
                    <a class="${currentView === 'search' ? 'active' : ''}" onclick="changeView('search')"><i class="fas fa-search"></i></a>
                    <a onclick="showCreatePost()"><i class="fas fa-plus-circle"></i></a>
                    <a class="${currentView === 'profile' ? 'active' : ''}" onclick="changeView('profile')"><i class="fas fa-user"></i></a>
                    <a class="${currentView === 'settings' ? 'active' : ''}" onclick="changeView('settings')"><i class="fas fa-cog"></i></a>
                `;
            } else {
                navLinks.innerHTML = `
                    <a onclick="showLogin()"><i class="fas fa-sign-in-alt"></i> Login</a>
                    <a onclick="showRegister()"><i class="fas fa-user-plus"></i> Register</a>
                `;
                bottomNav.innerHTML = `
                    <a onclick="showLogin()"><i class="fas fa-home"></i></a>
                    <a onclick="showLogin()"><i class="fas fa-search"></i></a>
                    <a onclick="showLogin()"><i class="fas fa-user"></i></a>
                    <a onclick="showLogin()"><i class="fas fa-cog"></i></a>
                `;
            }
        }

        function changeView(view) {
            if (!currentUser && view !== 'login' && view !== 'register') {
                showLogin();
                return;
            }
            currentView = view;
            if (view === 'feed') showFeed();
            else if (view === 'search') showSearch();
            else if (view === 'profile') showProfile(currentUser.username);
            else if (view === 'settings') showSettings();
            else if (view === 'userProfile' && viewingUserId) showProfile(viewingUserId);
        }

        // ========== AUTH ==========
        function showLogin() {
            currentView = 'login';
            renderNav();
            document.getElementById('mainContent').innerHTML = `
                <div style="max-width: 400px; margin: 2rem auto;">
                    <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
                    <form id="loginForm">
                        <div style="margin-bottom: 1rem;">
                            <label>Username</label>
                            <input type="text" id="loginUsername" placeholder="Enter username" style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:0.5rem; background:var(--bg-primary); color:var(--text-primary);">
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <label>Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter password" style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:0.5rem; background:var(--bg-primary); color:var(--text-primary);">
                        </div>
                        <button type="submit" style="width:100%; padding:0.8rem; background:var(--accent); color:white; border:none; border-radius:0.5rem; font-size:1rem;">Log In</button>
                        <p style="text-align:center; margin-top:1rem;">
                            Don't have an account? <a href="#" onclick="showRegister()" style="color:var(--accent);">Sign up</a>
                        </p>
                    </form>
                </div>
            `;
            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value; // dummy check
                if (username && password && users[username]) {
                    currentUser = { username, name: users[username].name, email: users[username].email };
                    localStorage.setItem('deeh_current_user', JSON.stringify(currentUser));
                    changeView('feed');
                } else {
                    alert('Invalid username or password (try alice/bob/charlie with any password)');
                }
            });
        }

        function showRegister() {
            currentView = 'register';
            renderNav();
            document.getElementById('mainContent').innerHTML = `
                <div style="max-width: 400px; margin: 2rem auto;">
                    <h2 style="text-align: center; margin-bottom: 2rem;">Join Deeh</h2>
                    <form id="registerForm">
                        <div style="margin-bottom: 1rem;">
                            <label>Name</label>
                            <input type="text" id="regName" required style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:0.5rem; background:var(--bg-primary); color:var(--text-primary);">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label>Username</label>
                            <input type="text" id="regUsername" required style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:0.5rem; background:var(--bg-primary); color:var(--text-primary);">
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label>Email</label>
                            <input type="email" id="regEmail" required style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:0.5rem; background:var(--bg-primary); color:var(--text-primary);">
                        </div>
                        <div style="margin-bottom: 1.5rem;">
                            <label>Password</label>
                            <input type="password" id="regPassword" required style="width:100%; padding:0.8rem; border:1px solid var(--border); border-radius:0.5rem; background:var(--bg-primary); color:var(--text-primary);">
                        </div>
                        <button type="submit" style="width:100%; padding:0.8rem; background:var(--accent); color:white; border:none; border-radius:0.5rem; font-size:1rem;">Sign Up</button>
                        <p style="text-align:center; margin-top:1rem;">
                            Already have an account? <a href="#" onclick="showLogin()" style="color:var(--accent);">Log in</a>
                        </p>
                    </form>
                </div>
            `;
            document.getElementById('registerForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('regName').value.trim();
                const username = document.getElementById('regUsername').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value;

                if (users[username]) {
                    alert('Username already taken');
                    return;
                }

                const newUser = {
                    username,
                    name,
                    avatar: name.charAt(0).toUpperCase(),
                    email,
                    bio: '',
                    followers: [],
                    following: [],
                    privacy: { public: true, messages: 'everyone' }
                };
                users[username] = newUser;
                currentUser = { username, name, email };
                localStorage.setItem('deeh_current_user', JSON.stringify(currentUser));
                saveData();
                changeView('feed');
            });
        }

        function logout() {
            localStorage.removeItem('deeh_current_user');
            currentUser = null;
            showLogin();
        }

        // ========== FEED ==========
        function showFeed() {
            currentView = 'feed';
            renderNav();
            let html = `
                <div class="create-post clearfix">
                    <textarea id="newPostContent" placeholder="What's on your mind, ${currentUser.name}?"></textarea>
                    <button onclick="createPost()">Post</button>
                </div>
                <div id="postsContainer"></div>
            `;
            document.getElementById('mainContent').innerHTML = html;
            renderPosts();
        }

        function renderPosts() {
            const container = document.getElementById('postsContainer');
            if (!container) return;

            // Sort posts by time descending
            const sortedPosts = [...posts].sort((a, b) => new Date(b.time) - new Date(a.time));

            let postsHtml = '';
            sortedPosts.forEach(post => {
                const user = users[post.userId];
                if (!user) return;
                const isLiked = post.likedBy.includes(currentUser.username);
                const timeAgo = formatTime(post.time);
                postsHtml += `
                    <div class="post" id="post-${post.id}">
                        <div class="post-header" onclick="viewUserProfile('${post.userId}')">
                            <div class="post-avatar">${user.avatar}</div>
                            <div class="post-user-info">
                                <div class="post-username">${user.name}</div>
                                <div class="post-time">${timeAgo}</div>
                            </div>
                        </div>
                        <div class="post-content">${post.content}</div>
                        <div class="post-stats">
                            <span><i class="fas fa-heart" style="color:#ef4444;"></i> ${post.likes} likes</span>
                            <span><i class="fas fa-comment"></i> ${post.comments.length} comments</span>
                            <span><i class="fas fa-share"></i> ${post.shares} shares</span>
                        </div>
                        <div class="post-actions">
                            <div class="post-action ${isLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                                <i class="fas fa-heart"></i> Like
                            </div>
                            <div class="post-action" onclick="toggleComments(${post.id})">
                                <i class="fas fa-comment"></i> Comment
                            </div>
                            <div class="post-action" onclick="sharePost(${post.id})">
                                <i class="fas fa-share"></i> Share
                            </div>
                        </div>
                        <div class="comments-section hidden" id="comments-${post.id}">
                            ${renderComments(post.comments)}
                            <div class="add-comment">
                                <input type="text" id="comment-input-${post.id}" placeholder="Write a comment...">
                                <button onclick="addComment(${post.id})">Post</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = postsHtml;
        }

        function renderComments(comments) {
            if (!comments || comments.length === 0) return '<p style="color:var(--text-secondary); text-align:center;">No comments yet.</p>';
            return comments.map(c => {
                const commentUser = users[c.userId];
                if (!commentUser) return '';
                return `
                    <div class="comment">
                        <div class="comment-avatar" onclick="viewUserProfile('${c.userId}')">${commentUser.avatar}</div>
                        <div class="comment-content">
                            <div class="comment-user" onclick="viewUserProfile('${c.userId}')">${commentUser.name}</div>
                            <div class="comment-text">${c.text}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function createPost() {
            const content = document.getElementById('newPostContent').value.trim();
            if (!content) return;

            const newPost = {
                id: Date.now(),
                userId: currentUser.username,
                content,
                time: new Date().toISOString(),
                likes: 0,
                likedBy: [],
                comments: [],
                shares: 0
            };
            posts.unshift(newPost);
            saveData();
            showFeed();
        }

        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            const index = post.likedBy.indexOf(currentUser.username);
            if (index === -1) {
                post.likedBy.push(currentUser.username);
                post.likes++;
            } else {
                post.likedBy.splice(index, 1);
                post.likes--;
            }
            saveData();
            renderPosts();
        }

        function toggleComments(postId) {
            const section = document.getElementById(`comments-${postId}`);
            if (section) section.classList.toggle('hidden');
        }

        function addComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            if (!text) return;
            const post = posts.find(p => p.id === postId);
            if (post) {
                post.comments.push({
                    id: Date.now(),
                    userId: currentUser.username,
                    text
                });
                saveData();
                renderPosts();
                document.getElementById(`comments-${postId}`).classList.remove('hidden');
            }
        }

        function sharePost(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                post.shares++;
                saveData();
                renderPosts();
                alert('Post shared! (Demo)');
            }
        }

        // ========== SEARCH ==========
        function showSearch() {
            currentView = 'search';
            renderNav();
            document.getElementById('mainContent').innerHTML = `
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search users..." onkeyup="performSearch()">
                </div>
                <div id="searchResults" class="search-results"></div>
            `;
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('searchResults');
            if (!query) {
                resultsDiv.innerHTML = '';
                return;
            }
            const matched = Object.values(users).filter(u => 
                u.name.toLowerCase().includes(query) || u.username.toLowerCase().includes(query)
            );
            if (matched.length === 0) {
                resultsDiv.innerHTML = '<p style="text-align:center; color:var(--text-secondary);">No users found</p>';
                return;
            }
            let html = '';
            matched.forEach(u => {
                html += `
                    <div class="search-result-item" onclick="viewUserProfile('${u.username}')">
                        <div class="suggestion-avatar" style="width:40px; height:40px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; color:white;">${u.avatar}</div>
                        <div>
                            <div style="font-weight:600;">${u.name}</div>
                            <div style="color:var(--text-secondary);">@${u.username}</div>
                        </div>
                    </div>
                `;
            });
            resultsDiv.innerHTML = html;
        }

        // ========== PROFILE (any user) ==========
        function viewUserProfile(username) {
            viewingUserId = username;
            currentView = 'userProfile';
            showProfile(username);
        }

        function showProfile(username) {
            const user = users[username];
            if (!user) return;

            renderNav();
            const isOwnProfile = (currentUser.username === username);
            const userPosts = posts.filter(p => p.userId === username);
            const totalLikes = userPosts.reduce((sum, p) => sum + p.likes, 0);
            const isFollowing = isOwnProfile ? false : user.followers.includes(currentUser.username);

            let html = `
                <div class="profile-header">
                    <div class="profile-avatar-large">${user.avatar}</div>
                    <h2>${user.name}</h2>
                    <p style="color:var(--text-secondary);">@${user.username}</p>
                    <p style="margin-top:0.5rem;">${user.bio || 'No bio yet.'}</p>
                    ${!isOwnProfile ? `
                        <button class="follow-btn ${isFollowing ? 'following' : ''}" onclick="toggleFollow('${user.username}')">
                            ${isFollowing ? 'Following' : 'Follow'}
                        </button>
                    ` : ''}
                </div>
                <div class="profile-stats">
                    <div class="stat-box">
                        <div class="stat-number">${userPosts.length}</div>
                        <div class="stat-label">Posts</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${totalLikes}</div>
                        <div class="stat-label">Likes</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${user.followers.length}</div>
                        <div class="stat-label">Followers</div>
                    </div>
                </div>
                <h3 style="margin: 2rem 0 1rem;">Posts</h3>
                <div id="userPostsContainer"></div>
            `;
            document.getElementById('mainContent').innerHTML = html;

            const container = document.getElementById('userPostsContainer');
            if (userPosts.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-secondary);">No posts yet.</p>';
            } else {
                let postsHtml = '';
                userPosts.forEach(post => {
                    postsHtml += `
                        <div class="post">
                            <div class="post-content">${post.content}</div>
                            <div class="post-stats" style="border:none;">
                                <span><i class="fas fa-heart" style="color:#ef4444;"></i> ${post.likes}</span>
                                <span><i class="fas fa-comment"></i> ${post.comments.length}</span>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = postsHtml;
            }
        }

        function toggleFollow(username) {
            const target = users[username];
            const current = users[currentUser.username];
            if (!target || !current) return;

            const index = target.followers.indexOf(currentUser.username);
            if (index === -1) {
                target.followers.push(currentUser.username);
                current.following.push(username);
            } else {
                target.followers.splice(index, 1);
                const followingIndex = current.following.indexOf(username);
                if (followingIndex !== -1) current.following.splice(followingIndex, 1);
            }
            saveData();
            showProfile(username);
        }

        // ========== SETTINGS ==========
        function showSettings() {
            currentView = 'settings';
            renderNav();
            renderSettings();
        }

        function renderSettings() {
            const user = users[currentUser.username];
            if (!user) return;

            let html = `
                <div class="settings-tabs">
                    <div class="settings-tab ${settingsTab === 'account' ? 'active' : ''}" onclick="switchSettingsTab('account')">Account</div>
                    <div class="settings-tab ${settingsTab === 'privacy' ? 'active' : ''}" onclick="switchSettingsTab('privacy')">Privacy</div>
                    <div class="settings-tab ${settingsTab === 'notifications' ? 'active' : ''}" onclick="switchSettingsTab('notifications')">Notifications</div>
                    <div class="settings-tab ${settingsTab === 'appearance' ? 'active' : ''}" onclick="switchSettingsTab('appearance')">Appearance</div>
                </div>
                <div id="settingsContent"></div>
            `;
            document.getElementById('mainContent').innerHTML = html;
            loadSettingsTab();
        }

        function switchSettingsTab(tab) {
            settingsTab = tab;
            renderSettings();
        }

        function loadSettingsTab() {
            const user = users[currentUser.username];
            const container = document.getElementById('settingsContent');
            if (!container) return;

            if (settingsTab === 'account') {
                container.innerHTML = `
                    <div class="settings-section">
                        <h3>Profile Information</h3>
                        <div class="settings-item">
                            <span class="settings-label">Name</span>
                            <input type="text" id="settingsName" class="settings-input" value="${user.name}">
                        </div>
                        <div class="settings-item">
                            <span class="settings-label">Username</span>
                            <input type="text" id="settingsUsername" class="settings-input" value="${user.username}" disabled style="background:var(--border);">
                        </div>
                        <div class="settings-item">
                            <span class="settings-label">Email</span>
                            <input type="email" id="settingsEmail" class="settings-input" value="${user.email}">
                        </div>
                        <div class="settings-item">
                            <span class="settings-label">Bio</span>
                            <textarea id="settingsBio" class="settings-input" rows="3">${user.bio || ''}</textarea>
                        </div>
                        <div class="settings-item">
                            <span class="settings-label">Profile Picture</span>
                            <div style="display:flex; gap:1rem; align-items:center;">
                                <div class="profile-avatar-large" style="width:60px; height:60px; font-size:1.5rem; margin:0;">${user.avatar}</div>
                                <button onclick="changeAvatar()" class="follow-btn" style="width:auto;">Change</button>
                            </div>
                        </div>
                        <button onclick="saveAccountSettings()" class="follow-btn" style="width:100%; margin-top:1rem;">Save Changes</button>
                    </div>
                    <div class="settings-section">
                        <h3>Account Management</h3>
                        <div class="settings-item">
                            <span class="settings-label">Change Password</span>
                            <button onclick="changePassword()" class="follow-btn" style="width:auto;">Change</button>
                        </div>
                        <div class="settings-item">
                            <span class="settings-label">Delete Account</span>
                            <button onclick="deleteAccount()" class="danger-btn">Delete</button>
                        </div>
                    </div>
                `;
            } else if (settingsTab === 'privacy') {
                container.innerHTML = `
                    <div class="settings-section">
                        <h3>Privacy Settings</h3>
                        <div class="settings-item">
                            <span class="settings-label">Private Account</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="privateAccount" ${!user.privacy.public ? 'checked' : ''}>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="settings-item">
                            <span class="settings-label">Who can see your posts</span>
                            <select id="postPrivacy" class="settings-input">
                                <option value="public" ${user.privacy.public ? 'selected' : ''}>Everyone</option>
                                <option value="followers" ${!user.privacy.public ? 'selected' : ''}>Followers only</option>
                            </select>
                        </div>
                        <div class="settings-item">
                            <span class="settings-label">Who can message you</span>
                            <select id="messagePrivacy" class="settings-input">
                                <option value="everyone" ${user.privacy.messages === 'everyone' ? 'selected' : ''}>Everyone</option>
                                <option value="followers" ${user.privacy.messages === 'followers' ? 'selected' : ''}>Followers only</option>
                                <option value="none" ${user.privacy.messages === 'none' ? 'selected' : ''}>No one</option>
                            </select>
                        </div>
                        <button onclick="savePrivacySettings()" class="follow-btn" style="width:100%; margin-top:1rem;">Save Privacy</button>
                    </div>
                `;
            } else if (settingsTab === 'notifications') {
                container.innerHTML = `
                    <div class="settings-section">
                        <h3>Notification Preferences</h3>
                        <div class="settings-item">
                            <span class="settings-label">Email Notifications</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="emailNotifications" ${localStorage.getItem('deeh_email_notif') !== 'false' ? 'checked' : ''}>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="settings-item">
                            <span class="settings-label">Push Notifications</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="pushNotifications" ${localStorage.getItem('deeh_push_notif') !== 'false' ? 'checked' : ''}>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button onclick="saveNotificationSettings()" class="follow-btn" style="width:100%; margin-top:1rem;">Save Preferences</button>
                    </div>
                `;
            } else if (settingsTab === 'appearance') {
                container.innerHTML = `
                    <div class="settings-section">
                        <h3>Appearance</h3>
                        <div class="settings-item">
                            <span class="settings-label">Dark Mode</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="darkModeToggle" ${darkMode ? 'checked' : ''} onchange="toggleDarkMode()">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="settings-item">
                            <span class="settings-label">Accent Color</span>
                            <input type="color" id="accentColor" value="#3b82f6" onchange="changeAccentColor(this.value)">
                        </div>
                    </div>
                `;
            }
        }

        function saveAccountSettings() {
            const user = users[currentUser.username];
            const newName = document.getElementById('settingsName')?.value.trim();
            const newEmail = document.getElementById('settingsEmail')?.value.trim();
            const newBio = document.getElementById('settingsBio')?.value.trim();
            if (newName) user.name = newName;
            if (newEmail) user.email = newEmail;
            user.bio = newBio;
            currentUser.name = newName;
            currentUser.email = newEmail;
            saveData();
            alert('Profile updated!');
            renderSettings();
        }

        function changeAvatar() {
            const newAvatar = prompt('Enter new avatar initial (single letter):', users[currentUser.username].avatar);
            if (newAvatar && newAvatar.length === 1) {
                users[currentUser.username].avatar = newAvatar.toUpperCase();
                saveData();
                renderSettings();
            }
        }

        function changePassword() {
            alert('Password change would be implemented with backend. (Demo)');
        }

        function deleteAccount() {
            if (confirm('Are you sure? This cannot be undone.')) {
                delete users[currentUser.username];
                posts = posts.filter(p => p.userId !== currentUser.username);
                localStorage.removeItem('deeh_current_user');
                currentUser = null;
                saveData();
                showLogin();
            }
        }

        function savePrivacySettings() {
            const user = users[currentUser.username];
            const privateAccount = document.getElementById('privateAccount')?.checked;
            const postPrivacy = document.getElementById('postPrivacy')?.value;
            const messagePrivacy = document.getElementById('messagePrivacy')?.value;

            user.privacy.public = !privateAccount; // if privateAccount checked => public false
            // For simplicity, we also set based on dropdown; but we can combine
            if (postPrivacy === 'followers') user.privacy.public = false;
            else user.privacy.public = true;

            user.privacy.messages = messagePrivacy;
            saveData();
            alert('Privacy settings saved!');
        }

        function saveNotificationSettings() {
            const email = document.getElementById('emailNotifications')?.checked;
            const push = document.getElementById('pushNotifications')?.checked;
            localStorage.setItem('deeh_email_notif', email);
            localStorage.setItem('deeh_push_notif', push);
            alert('Notification preferences saved!');
        }

        function toggleDarkMode() {
            darkMode = !darkMode;
            if (darkMode) {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
            localStorage.setItem('deeh_dark_mode', darkMode);
        }

        function changeAccentColor(color) {
            document.documentElement.style.setProperty('--accent', color);
            localStorage.setItem('deeh_accent_color', color);
        }

        function showCreatePost() {
            changeView('feed');
            setTimeout(() => document.getElementById('newPostContent')?.focus(), 100);
        }

        // Initialize
        initData();
        if (currentUser) {
            changeView('feed');
        } else {
            showLogin();
        }

        // Load accent color if saved
        const savedAccent = localStorage.getItem('deeh_accent_color');
        if (savedAccent) {
            document.documentElement.style.setProperty('--accent', savedAccent);
        }
    </script>
</body>
</html>
